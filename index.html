<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rmi-net // Home</title>
    <!-- Tailwind CSS für das Design -->
    <script src="https://jsdelivr.net"></script>
</head>
<body class="bg-[#090d16] text-slate-100 min-h-screen flex flex-col justify-between font-sans antialiased relative">

    <!-- Subtiler Hintergrund-Effekt -->
    <div class="absolute top-1/3 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-emerald-500/5 blur-[130px] rounded-full pointer-events-none"></div>

    <!-- Header -->
    <header class="max-w-5xl w-full mx-auto px-6 py-8 relative z-10">
        <div class="text-xl font-bold tracking-wider text-emerald-400 font-mono">
            rmi-net<span class="text-slate-500">.github.io</span>
        </div>
    </header>

    <!-- Hauptinhalt -->
    <main class="max-w-2xl w-full mx-auto px-6 py-12 text-center my-auto relative z-10">
        <span class="px-3 py-1 text-xs font-medium tracking-widest text-emerald-400 uppercase bg-emerald-500/10 border border-emerald-500/20 rounded-full font-mono">
            Status: Hauptseite Aktiv
        </span>
        <h1 class="text-4xl sm:text-6xl font-black tracking-tight text-white mt-6 mb-4">
            Bereit für neue <br>
            <span class="bg-gradient-to-r from-emerald-400 to-teal-500 bg-clip-text text-transparent">Web-Projekte</span>.
        </h1>
        <p class="text-slate-400 text-lg max-w-md mx-auto leading-relaxed">
            Der Haupt-Server wurde erfolgreich eingerichtet. Ab jetzt werden alle hier hochgeladenen Claude-Artifacts direkt unter dieser Domain erreichbar sein.
        </p>
    </main>

    <!-- Footer -->
    <footer class="max-w-5xl w-full mx-auto px-6 py-8 border-t border-slate-900 flex flex-col sm:flex-row justify-between items-center gap-4 text-sm text-slate-500 font-mono relative z-10">
        <div>&copy; 2026 rmi-net. Alle Rechte vorbehalten.</div>
        <div class="text-slate-600">Hosted via GitHub Pages</div>
    </footer>

</body>
</html>
